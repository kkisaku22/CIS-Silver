<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Budget Tracker</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- jQuery UI CSS -->
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container my-5">
    <h1 class="text-center mb-4">Mini Budget Tracker</h1>

    <form id="itemForm" class="mb-4">
      <div class="row g-2">
        <div class="col-md-3">
          <input type="text" class="form-control" placeholder="Title" id="title">
        </div>
        <div class="col-md-2">
          <input type="number" class="form-control" placeholder="Amount" id="amount">
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" placeholder="Category" id="category">
        </div>
        <div class="col-md-2">
          <input type="text" class="form-control datepicker" placeholder="Date" id="date">
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-primary w-100">Add Item</button>
        </div>
      </div>
    </form>

    <div id="itemsList" class="list-group"></div>
  </div>

  <!-- jQuery & jQuery UI -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    $(function(){
      $(".datepicker").datepicker({ dateFormat: 'yy-mm-dd' });

      const loadItems = () => {
        $.get("/api/items", data => {
          const list = $("#itemsList").empty();
          data.forEach(item => {
            list.append(`<div class="list-group-item d-flex justify-content-between align-items-center">
              <div>
                <strong>${item.title}</strong> - ${item.amount} (${item.category}) - ${item.date}
              </div>
              <button class="btn btn-sm btn-danger deleteBtn" data-id="${item._id}">Delete</button>
            </div>`);
          });
        });
      };

      loadItems();

      $("#itemForm").submit(function(e){
        e.preventDefault();
        const payload = {
          title: $("#title").val(),
          amount: $("#amount").val(),
          category: $("#category").val(),
          date: $("#date").val()
        };
        $.post("/api/items", payload, () => {
          loadItems();
          $(this).trigger("reset");
        });
      });

      $("#itemsList").on("click", ".deleteBtn", function(){
        const id = $(this).data("id");
        $.ajax({
          url: `/api/items/${id}`,
          type: "DELETE",
          success: loadItems
        });
      });
    });
  </script>
</body>
</html>
