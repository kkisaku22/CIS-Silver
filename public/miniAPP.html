<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Budget App</title>

  <!-- normalize -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">
  <h1 class="text-center">💰 Mini Budget App</h1>
  <p class="text-center">By Karel Kisaku</p>

  <div class="card p-4 shadow">
    <form id="itemForm">
      <input type="hidden" id="editId">

      <input class="form-control mb-2" id="title" placeholder="Title" required>
      <input class="form-control mb-2" id="amount" type="number" placeholder="Amount" required>
      <input class="form-control mb-2" id="category" placeholder="Category" required>
      <input class="form-control mb-3" id="date" type="date" required>

      <button class="btn btn-primary w-100">Save Item</button>
    </form>
  </div>

  <div class="mt-4" id="itemList"></div>
</div>

<script>
let editingId = null;

async function loadItems() {
  const res = await fetch('/api/items');
  const data = await res.json();

  $('#itemList').html(data.map(item => `
    <div class="card mt-2 shadow-sm">
      <div class="card-body">
        <h5>${item.title}</h5>
        <p>$${item.amount} | ${item.category} | ${item.date}</p>
        <button class="btn btn-warning btn-sm" onclick="editItem('${item._id}', '${item.title}', '${item.amount}', '${item.category}', '${item.date}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteItem('${item._id}')">Delete</button>
      </div>
    </div>
  `));
}

$('#itemForm').submit(async function(e){
  e.preventDefault();

  const item = {
    title: $('#title').val(),
    amount: $('#amount').val(),
    category: $('#category').val(),
    date: $('#date').val()
  };

  const url = editingId ? `/api/items/${editingId}` : '/api/items';
  const method = editingId ? 'PUT' : 'POST';

  await fetch(url, {
    method,
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(item)
  });

  this.reset();
  editingId = null;
  loadItems();
});

function editItem(id, title, amount, category, date){
  editingId = id;
  $('#title').val(title);
  $('#amount').val(amount);
  $('#category').val(category);
  $('#date').val(date);
}

async function deleteItem(id){
  await fetch(`/api/items/${id}`, { method: 'DELETE' });
  loadItems();
}

loadItems();
</script>

</body>
</html>
