name: deploy-miniApp-to-gcp.yml

on:
  push:
    branches: [miniApp]   # deploys when miniApp branch is pushed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # safer than StrictHostKeyChecking=no
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy miniApp over SSH
        shell: bash
        env:
          SSH_USER: karelkis23
          SSH_HOST: 35.222.111.208
          APP_DIR: app       # your existing app folder
          PM2_NAME: app      # PM2 process name
        run: |
          ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" <<EOF
            set -e

            cd "$APP_DIR"

            # Make sure local app folder matches miniApp branch
            git fetch origin
            git checkout miniApp
            git reset --hard origin/miniApp

            # Install dependencies
            npm ci

            # Restart PM2
            pm2 delete "$PM2_NAME" || true
            pm2 start -f app.mjs --name "$PM2_NAME"

            pm2 save
          EOF
